<!DOCTYPE html>
<html>
    <head>
        <title>Logical Operators (AND)</title>
        <script src="ANDOperators.js" defer></script>
    </head>
    <body>
        <h1>AND (&&) Operator</h1>
        <label for="lblAge">Age:</label>
        <input id="txtAge" type="number" placeholder="Enter your Age"><br>
        <label for="lblGender">Gender:</label>
        <input id="rdoMale" name="gender" type="radio" value="male">Male
        <input id="rdoFemale" name="gender" type="radio" value="female">Female
        <input id="rdoOthers" name="gender" type="radio" value="others">Others<br>
        <button id="btnANDOperator" onclick="onClickANDOperator()">AND Operators</button>
        <p id="pResult"></p>
    </body>
</html>
